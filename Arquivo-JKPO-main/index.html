<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô PWA</title>
    <link rel="manifest" href="manifest.json">
    
   
</head>
<body>
    <h1>Jokenpô</h1>
    
    <h3>Jogador</h3>
    <img src="./pedra.png" alt="pedra">
    <img src="./papel.png" alt="papel">
    <img src= "./tesoura.png" alt="tesoura">
    <form name="frmjokenpo">
        <input type="radio" name="grupo" id="pedra"> Pedra
        <input type="radio" name="grupo" id="papel"> Papel
        <input type="radio" name="grupo" id="tesoura"> Tesoura
        <p>
            <button type="button" onclick="jogar()">JOGAR</button>
            <button type="reset" onclick="resetar()">RESET</button>
        </p>
    </form>

    <hr>
    <h3>Computador:</h3>
    <img src="pc.png" alt="pc" id="pc">
    
    <div id="placar">placar</div>

    <script>
        function jogar() {
           
            const opcoes = ["pedra", "papel", "tesoura"];
            const imagensPC = ["pcpedra.png", "pcpapel.png", "pctesoura.png"];
            let escolhaJogador = -1;

            
            for (let i = 0; i < opcoes.length; i++) {
                if (document.getElementById(opcoes[i]).checked) {
                    escolhaJogador = i; 
                }
            }

            
            if (escolhaJogador === -1) {
                alert("Por favor, selecione uma opção antes de jogar!");
                return;
            }

            
            let sorteio = Math.floor(Math.random() * 3);
            
            
            document.getElementById("pc").src = imagensPC[sorteio];

                    
            let resultado = (escolhaJogador - sorteio + 3) % 3;
            const mensagens = ["EMPATE! ", "VOCÊ VENCEU!", "PC VENCEU!"];
            
            document.getElementById("placar").innerHTML = mensagens[resultado];
        }

        function resetar() {
            document.getElementById("pc").src = "pc.png";
            document.getElementById("placar").innerHTML = "Escolha uma opção e jogue!";
        }

        if('serviceWorker' in navigator){
            window.addEventListener('load',()=>{
                navigator.serviceWorker.register('sw.js')
                .then(()=> console.log('Service worker registrado'))
                .catch(err=> console.log('Erro', err));});

        }

    

        
    </script>
</body>
</html>
