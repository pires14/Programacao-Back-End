<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tabuada</h1>
    <input type="number" id="numero">
    <button onclick="gerar()">Gerar</button>
    <ul id="Lista">

    </ul>

 <script>
        
function gerar(){  
    let num = Number(document.getElementById("numero").value);
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    for(let i =1; i<=10; i++){
        let itemDigitado = document.createElement("li");
        itemDigitado.innerHTML = num + "X" + i + "=" + (num * i);
        lista.appendChild(itemDigitado);

        }
    }
</script>
</body>
</html>
